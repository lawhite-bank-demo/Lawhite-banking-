<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(160deg,#020617,#031427,#021a35);
  color:white;
}
.container{max-width:420px;margin:auto;padding:20px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:16px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.06);
}

.balance-card{
  background:linear-gradient(135deg,#3aa0ff,#6ed0ff);
  border-radius:20px;
  padding:22px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.balance{font-size:34px;font-weight:700;}
.eye{margin-top:6px;font-size:14px;cursor:pointer;}

.grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:8px;
}

button{
 width:100%;
 padding:10px;
 border:none;
 border-radius:10px;
 background:#2d8cff;
 color:white;
 font-weight:600;
}

input,select{
 width:100%;
 padding:10px;
 margin-top:6px;
 border-radius:8px;
 border:none;
}

.tx{margin-top:10px;}
.small{font-size:12px;opacity:.7;}
</style>
</head>
<body>

<div class="container">

<h3 id="welcome">Loading...</h3>

<div class="balance-card">
  <div class="balance" id="balance">€0</div>
  <div class="eye" id="eyeToggle">👁 Hide balance</div>
</div>

<div class="card">
<b>Account Info</b><br>
Name: <span id="name">-</span><br>
Account: <span id="acc">-</span><br>
IBAN: <span id="iban">-</span><br>
SWIFT: <span id="swift">-</span>
</div>

<div class="card">
<b>Quick Actions</b>
<div class="grid">
  <button onclick="showSend()">Send</button>
  <button onclick="showBills()">Pay Bills</button>
  <button onclick="showGift()">Gift Cards</button>
  <button onclick="alert('Coming soon')">Withdraw</button>
  <button onclick="alert('Coming soon')">Deposit</button>
  <button onclick="location.reload()">Refresh</button>
</div>
</div>

<!-- SEND -->
<div class="card" id="sendBox" style="display:none;">
<b>Send Money</b>
<input id="receiver" placeholder="Username or IBAN">
<input id="sendAmount" type="number" placeholder="Amount">
<input id="sendNote" placeholder="Note">
<button onclick="sendMoney()">Send</button>
</div>

<!-- PAY BILLS -->
<div class="card" id="billBox" style="display:none;">
<b>Pay Bills</b>
<select id="billType">
<option>Electricity</option>
<option>Internet</option>
<option>Water</option>
<option>TV Subscription</option>
</select>
<input id="billAmount" type="number" placeholder="Amount">
<button onclick="payBill()">Pay</button>
</div>

<!-- GIFT CARD -->
<div class="card" id="giftBox" style="display:none;">
<b>Gift Card</b>
<select id="giftAmount">
<option value="50">€50</option>
<option value="100">€100</option>
<option value="200">€200</option>
<option value="500">€500</option>
</select>
<button onclick="buyGift()">Buy Gift Card</button>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<button onclick="logout()" style="background:#ff4d4d;margin-top:10px;">Logout</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyBDp6wmJMY8WPyKPNE-bvVSiz4AIUbn71U",
 authDomain:"dechase-bank.firebaseapp.com",
 projectId:"dechase-bank"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const username = localStorage.getItem("user");
if(!username) location.href="index.html";

let userData;
let balanceValue=0;

// load user
async function loadUser(){
 const snap = await getDoc(doc(db,"users",username));
 userData = snap.data();

 welcome.innerText="Hello, "+(userData.fullName || username);
 name.innerText=userData.fullName || "-";
 acc.innerText=userData.accountNumber || "-";
 iban.innerText=userData.iban || "-";
 swift.innerText=userData.swift || "-";

 balanceValue=Number(userData.balance||0);
 renderBalance();
 renderTransactions();
}
loadUser();

// balance toggle
let hidden=false;
function renderBalance(){
 balance.innerText=hidden?"••••••":"€"+balanceValue.toLocaleString();
 eyeToggle.innerText=hidden?"👁 Show balance":"👁 Hide balance";
}
eyeToggle.onclick=()=>{hidden=!hidden;renderBalance();}

// show boxes
window.showSend=()=>sendBox.style.display="block";
window.showBills=()=>billBox.style.display="block";
window.showGift=()=>giftBox.style.display="block";

// transactions display
function renderTransactions(){
 const box=document.getElementById("transactions");
 box.innerHTML="";
 if(userData.transactions){
  userData.transactions.slice().reverse().forEach(tx=>{
   const color=tx.amount>0?"#00ffb2":"#ff6b6b";
   box.innerHTML+=`
   <div class="tx" style="color:${color}">
   ${tx.note} (€${Math.abs(tx.amount)})
   <div class="small">${tx.date||""}</div>
   </div>`;
  });
 }
}

// send money
window.sendMoney=async()=>{
 const receiver=receiver.value.trim();
 const amount=parseFloat(sendAmount.value);
 const note=sendNote.value||"Transfer";

 if(!receiver||!amount) return alert("Enter details");
 if(balanceValue<amount) return alert("Insufficient funds");

 const users=await getDocs(collection(db,"users"));
 let recName=null,recData=null;

 users.forEach(d=>{
  if(d.id===receiver || d.data().iban===receiver){
   recName=d.id; recData=d.data();
  }
 });

 if(!recName) return alert("Receiver not found");

 const date=new Date().toLocaleString();

 await updateDoc(doc(db,"users",username),{
  balance:balanceValue-amount,
  transactions:[...(userData.transactions||[]),
   {amount:-amount,note:"Sent to "+recName,date}]
 });

 await updateDoc(doc(db,"users",recName),{
  balance:Number(recData.balance||0)+amount,
  transactions:[...(recData.transactions||[]),
   {amount:amount,note:"Received from "+username,date}]
 });

 alert("Transfer successful");
 location.reload();
};

// pay bills
window.payBill=async()=>{
 const type=billType.value;
 const amt=parseFloat(billAmount.value);
 if(!amt) return alert("Enter amount");
 if(balanceValue<amt) return alert("Insufficient funds");

 const date=new Date().toLocaleString();

 await updateDoc(doc(db,"users",username),{
  balance:balanceValue-amt,
  transactions:[...(userData.transactions||[]),
   {amount:-amt,note:type+" bill payment",date}]
 });

 alert("Bill paid");
 location.reload();
};

// gift card
window.buyGift=async()=>{
 const amt=parseFloat(giftAmount.value);
 if(balanceValue<amt) return alert("Insufficient funds");

 const date=new Date().toLocaleString();

 await updateDoc(doc(db,"users",username),{
  balance:balanceValue-amt,
  transactions:[...(userData.transactions||[]),
   {amount:-amt,note:"Gift card purchase",date}]
 });

 alert("Gift card purchased");
 location.reload();
};

window.logout=()=>{
 localStorage.removeItem("user");
 location.href="index.html";
}
</script>
</body>
</html>
