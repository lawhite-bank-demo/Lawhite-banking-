<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(160deg,#020617,#031427,#021a35);
  color:white;
}
.container{max-width:420px;margin:auto;padding:20px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:16px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.06);
}

.balance-card{
  background:linear-gradient(135deg,#3aa0ff,#6ed0ff);
  border-radius:20px;
  padding:22px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.balance{font-size:34px;font-weight:700;}
.eye{margin-top:6px;font-size:14px;cursor:pointer;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

button, input, select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:6px;
}

button{
  background:#2d8cff;
  color:white;
  font-weight:600;
}

.green{color:#00ffb2;}
.red{color:#ff6b6b;}
.small{font-size:12px;opacity:.7;}
</style>
</head>
<body>

<div class="container">

<h3 id="welcome">Loading...</h3>

<!-- BALANCE -->
<div class="balance-card">
  <div class="balance" id="balance">€0</div>
  <div class="eye" id="toggleBalance">👁 Hide balance</div>
</div>

<!-- ACCOUNT INFO -->
<div class="card">
<b>Account Info</b><br>
Name: <span id="name">-</span><br>
Account: <span id="acc">-</span><br>
IBAN: <span id="iban">-</span><br>
SWIFT: <span id="swift">-</span>
</div>

<!-- QUICK ACTIONS -->
<div class="card">
<b>Quick Actions</b>
<div class="grid">
  <button onclick="showTransfer()">Send</button>
  <button onclick="showBills()">Pay Bills</button>
  <button onclick="showGift()">Gift Cards</button>
  <button onclick="alert('Withdraw coming soon')">Withdraw</button>
  <button onclick="alert('Deposit coming soon')">Deposit</button>
  <button onclick="location.reload()">Refresh</button>
</div>
</div>

<!-- TRANSFER -->
<div class="card" id="transferBox" style="display:none;">
<b>Send Money</b>
<input id="receiver" placeholder="Username or IBAN">
<input id="amount" type="number" placeholder="Amount">
<button onclick="askPin()">Send</button>
</div>

<!-- PAY BILLS -->
<div class="card" id="billBox" style="display:none;">
<b>Pay Bills</b>
<select id="billType">
<option>Electricity</option>
<option>Water</option>
<option>Internet</option>
<option>TV Subscription</option>
</select>
<input id="billAmount" type="number" placeholder="Amount">
<button onclick="payBill()">Pay</button>
</div>

<!-- GIFT CARDS -->
<div class="card" id="giftBox" style="display:none;">
<b>Buy Gift Card</b>
<select id="giftType">
<option>Amazon</option>
<option>iTunes</option>
<option>Steam</option>
<option>Google Play</option>
</select>
<input id="giftAmount" type="number" placeholder="Amount">
<button onclick="buyGift()">Buy</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<button onclick="logout()" style="background:#ff4d4d">Logout</button>

<!-- SUPPORT BUTTON -->
<button onclick="contactSupport()" style="background:#25D366;margin-top:10px;">
💬 Contact Bank Support
</button>

</div>

<!-- PIN MODAL -->
<div id="pinModal" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;">
 <div style="background:#0a223d;padding:25px;border-radius:15px;width:85%;max-width:320px;text-align:center;">
   <h3>Enter PIN</h3>
   <input id="pinInput" type="password">
   <button onclick="confirmTransfer()">Confirm</button>
   <button onclick="closePin()" style="background:#555;margin-top:6px;">Cancel</button>
 </div>
</div>

<!-- SUPPORT SCRIPT -->
<script>
function contactSupport(){
  const phone = "14237960225";
  const message = encodeURIComponent("Hello DeChase Bank Support, I need help with my account.");
  window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}
</script>

<!-- LOAD APP LOGIC -->
<script type="module" src="dashboard.js?v=3"></script>

</body>
</html>
