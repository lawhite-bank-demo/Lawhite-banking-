<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DeChase Bank</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding-bottom:80px;
}
.container{max-width:420px;margin:auto;padding:20px;}
.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}
.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;
border-radius:20px;
text-align:center;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}
.tx{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-top:10px;
}
.bottomNav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#021a35;
padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h3 id="welcome"></h3>

<div class="balance-card">
<div>Total Balance</div>
<div id="balance"></div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">
<button onclick="openPinModal()">Send Money</button>
<button onclick="payBill('Electricity',120)">Pay Bills</button>
<button onclick="buyGiftCard('Amazon',100)">Gift Cards</button>
<button onclick="contactSupport()">WhatsApp Support</button>
</div>

<div class="card">
<b>Account</b><br>
IBAN: <span id="iban"></span><br>
SWIFT: <span id="swift"></span><br>
Address: <span id="bankAddress"></span>
</div>

<div class="card">
<b>Pending</b>
<div id="pendingTransactions"></div>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<div class="card">
Name: <span id="nameProfile"></span><br>
Email: <span id="emailProfile"></span>
<button onclick="logout()">Logout</button>
</div>

</div>

<div id="pinModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center;">
<div class="card">
<input id="pinInput" placeholder="Enter PIN">
<button onclick="confirmPin()">Confirm</button>
<button onclick="closePin()">Cancel</button>
</div>
</div>

<div class="bottomNav">
<button>Home</button>
</div>

<script>
function contactSupport(){
window.open("https://wa.me/13312016202");
}
</script>

<script type="module" src="dashboard.js"></script>

</body>
</html>
