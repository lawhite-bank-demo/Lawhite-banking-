<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeChase Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#020617,#020f1f,#031427);
color:white;
padding-bottom:90px;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border-radius:20px;
padding:18px;
margin-bottom:16px;
}

.balance-card{
background:linear-gradient(135deg,#1d4ed8,#2563eb,#0ea5e9);
border-radius:25px;
padding:26px;
text-align:center;
margin-bottom:18px;
}

.balance{font-size:40px;font-weight:700;}

.eye{font-size:13px;margin-top:8px;cursor:pointer;}

input{
width:100%;
padding:13px;
border-radius:14px;
border:none;
margin-top:10px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:14px;
margin-top:10px;
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
font-weight:600;
}

.tx{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
margin-top:10px;
}

.small{font-size:12px;opacity:.7;}

#pinModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}
</style>

</head>

<body>

<div class="container">

<h3 id="welcome">Loading...</h3>

<div class="balance-card">
<div style="opacity:.8;font-size:13px;">Total Balance</div>
<div class="balance" id="balance">€0</div>
<div id="toggleBalance" class="eye">👁 Hide balance</div>
</div>

<div class="card">
<b>Quick Actions</b>
<button onclick="openPinModal()">💸 Send Money</button>
<button onclick="addMoney()">➕ Add Money</button>
<button onclick="downloadStatement()">📄 Bank Statement</button>
</div>

<div class="card">
<b>Transfer</b>
<input id="receiver" placeholder="Account / IBAN">
<input id="amount" placeholder="Amount">
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<div class="card">
<button onclick="logout()">Logout</button>
</div>

</div>

<!-- PIN MODAL -->
<div id="pinModal">
<div class="card" style="width:90%;max-width:320px;">
<h3>Enter PIN</h3>
<input id="pinInput" type="password">
<button onclick="confirmPin()">Confirm</button>
<button onclick="closePin()">Cancel</button>
</div>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
