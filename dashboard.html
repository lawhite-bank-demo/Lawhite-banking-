<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeChase Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- ✅ PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#031427;
color:white;
padding-bottom:90px;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
background:rgba(255,255,255,0.05);
border-radius:18px;
padding:18px;
margin-bottom:16px;
}

.balance-card{
background:linear-gradient(135deg,#2f80ed,#56ccf2);
border-radius:22px;
padding:24px;
text-align:center;
margin-bottom:18px;
}

.balance{font-size:36px;font-weight:700;}

.tx{
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:10px;
margin-top:10px;
}

.small{font-size:12px;opacity:.8;}

button,input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
}

button{
background:#1d4ed8;
color:white;
font-weight:600;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#021a35;
display:flex;
justify-content:space-around;
padding:12px;
}

</style>
</head>

<body>

<div class="container">

<h3 id="welcome">Loading...</h3>

<div class="balance-card">
<div class="balance" id="balance">€0</div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">
<b>Account Info</b><br>
Name: <span id="name"></span><br>
Account: <span id="acc"></span>
</div>

<div class="card">
<b>Transfer</b>
<input id="receiver" placeholder="Account / IBAN">
<input id="amount" placeholder="Amount">
<button onclick="openPinModal()">Send</button>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<div class="card">
<button onclick="downloadStatement()">Download Statement</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<!-- PIN MODAL -->
<div id="pinModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
<div class="card">
<h3>Enter PIN</h3>
<input id="pinInput" type="password">
<button onclick="confirmPin()">Confirm</button>
<button onclick="closePin()">Cancel</button>
</div>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
