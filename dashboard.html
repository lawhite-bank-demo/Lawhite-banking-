<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(160deg,#020617,#031427,#021a35);
  color:white;
}
.container{max-width:420px;margin:auto;padding:20px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:16px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.06);
}

.balance-card{
  background:linear-gradient(135deg,#3aa0ff,#6ed0ff);
  border-radius:20px;
  padding:22px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.balance{font-size:34px;font-weight:700;}
.eye{margin-top:6px;font-size:14px;cursor:pointer;}
.loading{text-align:center;margin-top:40px;opacity:.7;}
</style>
</head>
<body>

<div class="container">

<h3 id="welcome">Loading...</h3>

<div class="balance-card">
  <div class="balance" id="balance">€0</div>
  <div class="eye" id="eyeToggle">👁 Hide balance</div>
</div>

<div class="card">
<b>Account Info</b><br>
Name: <span id="name">-</span><br>
Account: <span id="acc">-</span><br>
IBAN: <span id="iban">-</span><br>
SWIFT: <span id="swift">-</span>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<button onclick="logout()" style="background:#ff4d4d;width:100%;padding:12px;border:none;border-radius:10px;color:white;">Logout</button>

<div id="loading" class="loading">Loading account data…</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyBDp6wmJMY8WPyKPNE-bvVSiz4AIUbn71U",
 authDomain:"dechase-bank.firebaseapp.com",
 projectId:"dechase-bank"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ check login session
const username = localStorage.getItem("user");
if(!username){
 location.href="index.html";
}

// load user safely
async function loadUser(){

 try{

   const userRef = doc(db,"users",username);
   const snap = await getDoc(userRef);

   if(!snap.exists()){
     alert("User data not found in database");
     return;
   }

   const data = snap.data();
   console.log("Loaded:", data);

   // display info
   document.getElementById("welcome").innerText =
     "Hello, " + (data.fullName || username);

   document.getElementById("name").innerText =
     data.fullName || "-";

   document.getElementById("acc").innerText =
     data.accountNumber || "-";

   document.getElementById("iban").innerText =
     data.iban || "-";

   document.getElementById("swift").innerText =
     data.swift || "-";

   let balanceValue = Number(data.balance ?? 0);
   let hidden = false;

   const balanceEl = document.getElementById("balance");
   const toggle = document.getElementById("eyeToggle");

   function renderBalance(){
     balanceEl.innerText = hidden
       ? "••••••"
       : "€" + balanceValue.toLocaleString();
     toggle.innerText = hidden
       ? "👁 Show balance"
       : "👁 Hide balance";
   }

   toggle.onclick = () => {
     hidden = !hidden;
     renderBalance();
   };

   renderBalance();

   // transactions
   const box = document.getElementById("transactions");
   box.innerHTML = "";

   if(data.transactions && data.transactions.length){
     data.transactions.slice().reverse().forEach(tx=>{
       const color = tx.amount > 0 ? "#00ffb2" : "#ff6b6b";
       box.innerHTML += `
         <div style="margin-top:10px;color:${color}">
           ${tx.note} (€${Math.abs(tx.amount).toLocaleString()})
           <div style="font-size:12px;opacity:.7">${tx.date || ""}</div>
         </div>
       `;
     });
   }else{
     box.innerHTML = "<p>No transactions yet</p>";
   }

   // hide loading
   document.getElementById("loading").style.display="none";

 }catch(err){
   alert("Network error. Check internet.");
   console.log(err);
 }

}

loadUser();

window.logout = () => {
 localStorage.removeItem("user");
 location.href="index.html";
}
</script>

</body>
</html>
