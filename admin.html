<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Add Transaction</title><style>
body{
  margin:0;
  font-family:Arial;
  background:#031427;
  color:white;
}
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}
.card{
  background:#0a1f44;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
input{background:#021022;color:white;}
button{background:#2563eb;color:white;font-weight:bold;}
.success{
  background:#16a34a;
  padding:10px;
  border-radius:8px;
  display:none;
  margin-bottom:10px;
}
</style></head>
<body><div class="container"><h2>Admin Transaction Panel</h2><div class="success" id="success">Transaction Added ✅</div><div class="card">
<input id="username" placeholder="Username (e.g jojosnow)">
<input id="amount" placeholder="Amount (use - for debit)">
<input id="note" placeholder="Note (e.g House Purchase)">
<input id="reference" placeholder="Reference (ACH-xxxx)">
<button onclick="addTransaction()">Add Transaction</button>
</div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBDp6wmJMY8WPyKPNE-bvVSiz4AIUbn71U",
authDomain: "dechase-bank.firebaseapp.com",
projectId: "dechase-bank"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getTx(data){
return data.transactions
? (Array.isArray(data.transactions)?data.transactions:Object.values(data.transactions))
: [];
}

window.addTransaction = async ()=>{

const username = document.getElementById("username").value.trim();
const amount = parseFloat(document.getElementById("amount").value);
const note = document.getElementById("note").value.trim();
const reference = document.getElementById("reference").value.trim();

if(!username || isNaN(amount) || !note){
alert("Fill all fields correctly");
return;
}

const userRef = doc(db,"users",username);
const snap = await getDoc(userRef);

if(!snap.exists()){
alert("User not found");
return;
}

const data = snap.data();
let tx = getTx(data);

// CREATE NEW TX
const newTx = {
amount: amount,
note: note,
date: new Date().toISOString(),
reference: reference || "ACH-"+Math.floor(Math.random()*1000000)
};

// ADD TO TOP
tx.unshift(newTx);

// SAVE
await updateDoc(userRef,{transactions:tx});

// SUCCESS UI
const s = document.getElementById("success");
s.style.display="block";

setTimeout(()=>{
s.style.display="none";
},2000);

// CLEAR
document.getElementById("amount").value="";
document.getElementById("note").value="";
document.getElementById("reference").value="";

};

</script>
</body>
</html>
